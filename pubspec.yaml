name: plateplan
description: Leckerly meal planning and shared lists app.
publish_to: 'none'
version: 0.1.21+24

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.3
  supabase_flutter: ^2.6.0
  firebase_core: ^3.4.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  google_generative_ai: ^0.4.6
  http: ^1.2.2
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^4.0.2
  intl: ^0.19.0
  collection: ^1.18.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  app_settings: ^6.1.1
  receive_sharing_intent: ^1.8.1
  app_links: ^6.4.1
  url_launcher: ^6.3.1
  reorderable_grid_view: ^2.2.8
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/branding/leckerly_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/branding/leckerly_logo_foreground.png
  # Lower inset = larger foreground in the circle; 8% still clears typical OEM masks with our padded 1024² art.
  adaptive_icon_foreground_inset: 8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/food_icons/
    - assets/images/food_icons/openmoji/
    - assets/lottie/
    - assets/data/
